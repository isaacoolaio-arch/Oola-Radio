<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1220">
<title>Oola Radio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root{
    --wood1:#4a2f16; --wood2:#6b4423; --wood3:#7d5230;
    --cream:#f3e7c9; --cream2:#e8d9b5; --cream3:#dcc9a0;
    --brass:#c9a24b; --brass2:#e0bf6e; --ink:#3a2a16; --ink2:#6d5636;
    --red:#b3402e; --green:#4a7c46;
    /* legacy variable names mapped to vintage palette (used throughout) */
    --bg:var(--wood1); --panel:var(--cream); --panel2:var(--cream2);
    --accent:var(--brass); --accent2:#a87c22; --text:var(--ink); --muted:var(--ink2);
    --line:#c4a878;
  }
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.06), transparent 60%),
      repeating-linear-gradient(95deg, rgba(0,0,0,.10) 0 2px, transparent 2px 7px),
      linear-gradient(160deg, var(--wood2), var(--wood1) 70%);
    color:var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    padding:12px 16px; display:flex; align-items:center; gap:10px;
    background:linear-gradient(180deg, var(--wood3), var(--wood2));
    border-bottom:4px solid var(--brass);
    box-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  header .logo{font-size:24px; filter:sepia(.6);}
  header h1{
    font-size:18px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
    color:var(--brass2); text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  header .sub{font-size:10px; color:var(--cream3); letter-spacing:2px; text-transform:uppercase; margin-top:1px;}
  header .scan{
    margin-left:8px; background:linear-gradient(180deg,var(--brass2),var(--brass));
    color:var(--ink); border:1px solid #8a6a2a; border-radius:6px;
    padding:7px 13px; font-size:12px; font-weight:700; font-family:inherit;
    display:flex; align-items:center; gap:5px; box-shadow:0 2px 3px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.5);
  }
  header .scan:disabled{opacity:.5;}
  header .scan:active{transform:translateY(1px); box-shadow:0 1px 1px rgba(0,0,0,.35);}

  .tabs{display:flex; background:var(--wood2); border-bottom:2px solid var(--brass); padding:0 8px; gap:4px;}
  .tabs button{
    flex:1; background:linear-gradient(180deg, #8a5c33, #6b4423);
    border:1px solid #4a2f16; border-bottom:none; border-radius:8px 8px 0 0;
    color:var(--cream3); padding:10px; font-size:13px; font-weight:700; font-family:inherit;
    margin-top:6px;
  }
  .tabs button.on{background:linear-gradient(180deg, var(--cream), var(--cream2)); color:var(--ink);}

  .searchbar{padding:10px 12px 4px; display:none;}
  .searchbar.show{display:block;}
  .searchbar input{
    width:100%; background:var(--cream); border:2px solid var(--brass);
    border-radius:6px; padding:11px 12px; color:var(--ink); font-size:14px; font-family:inherit;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.15);
  }
  .searchbar input::placeholder{color:var(--ink2);}

  .list{flex:1; overflow-y:auto; padding:8px 12px 12px;}
  .status-row{
    text-align:center; color:var(--cream3); font-size:13px; padding:22px 12px; line-height:1.5;
    font-style:italic;
  }
  .status-row b{color:var(--brass2);}
  .status-row .spin{
    display:inline-block; width:22px; height:22px; border:3px solid var(--wood3);
    border-top-color:var(--brass2); border-radius:50%; animation:sp .8s linear infinite; margin-bottom:8px;
  }
  @keyframes sp{to{transform:rotate(360deg)}}
  .add-inline{
    background:linear-gradient(180deg,var(--brass2),var(--brass)); color:var(--ink);
    border:1px solid #8a6a2a; border-radius:6px; padding:5px 12px; font-size:12px; font-weight:700; font-family:inherit;
    box-shadow:0 1px 2px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .section-h{
    font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--brass2);
    margin:12px 4px 8px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid rgba(201,162,75,.35); padding-bottom:4px;
  }

  .station{
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(180deg, var(--cream), var(--cream2));
    border:2px solid var(--line); border-radius:8px; padding:11px 13px; margin-bottom:8px;
    box-shadow:0 2px 4px rgba(0,0,0,.28);
  }
  .station.active{border-color:var(--red); box-shadow:0 0 0 1px var(--red), 0 2px 6px rgba(0,0,0,.3);}
  .station .ico{
    width:40px; height:40px; border-radius:6px;
    background:radial-gradient(circle at 35% 30%, var(--brass2), var(--brass) 70%);
    border:1px solid #8a6a2a;
    display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; overflow:hidden;
  }
  .station .ico img{width:100%; height:100%; object-fit:cover;}
  .station .tap{display:flex; align-items:center; gap:11px; flex:1; min-width:0;}
  .station .meta{flex:1; min-width:0;}
  .station .name{font-size:14.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .station .desc{font-size:11.5px; color:var(--ink2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; font-style:italic;}
  .station .fav,.station .del{background:transparent; border:none; font-size:17px; padding:4px 6px; flex-shrink:0; color:var(--ink2); font-family:inherit;}
  .station .fav.on{color:var(--red);}
  .live-dot{width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ===== vintage radio player cabinet ===== */
  .player{
    background:
      radial-gradient(circle, rgba(0,0,0,.28) 1.2px, transparent 1.6px) 0 0/9px 9px,
      linear-gradient(180deg, var(--wood3), var(--wood2));
    border-top:5px solid var(--brass);
    padding:10px 16px calc(14px + env(safe-area-inset-bottom));
    box-shadow:0 -3px 10px rgba(0,0,0,.45);
  }
  /* tuning dial */
  .dial{
    position:relative; height:44px; margin-bottom:10px;
    background:linear-gradient(180deg, var(--cream), var(--cream2));
    border:2px solid var(--brass); border-radius:6px; overflow:hidden;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.25);
  }
  .dial .ticks{
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg, rgba(58,42,22,.55) 0 1px, transparent 1px 10%);
    opacity:.55;
  }
  .dial .nums{
    position:absolute; inset:0; display:flex; justify-content:space-between; align-items:center;
    padding:0 10px; font-family:'Courier New', monospace; font-size:11px; font-weight:700; color:var(--ink);
  }
  .dial .band{position:absolute; left:10px; top:3px; font-size:8px; letter-spacing:2px; color:var(--red); font-weight:700;}
  .dial .needle{
    position:absolute; top:0; bottom:0; width:3px; left:50%;
    background:var(--red); box-shadow:0 0 4px rgba(179,64,46,.8);
    transition:left .8s cubic-bezier(.3,1.2,.4,1);
  }
  .now{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .now .art{
    width:46px; height:46px; border-radius:6px;
    background:radial-gradient(circle at 35% 30%, var(--brass2), var(--brass) 70%);
    border:2px solid #8a6a2a;
    display:flex; align-items:center; justify-content:center; font-size:21px; flex-shrink:0; overflow:hidden;
  }
  .now .art img{width:100%; height:100%; object-fit:cover;}
  .now .info{flex:1; min-width:0;}
  .now .info .t{font-size:14.5px; font-weight:700; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .now .info .s{font-size:12px; color:var(--cream3); margin-top:2px; font-style:italic;}
  .now .info .s.buffering{color:var(--brass2);}
  .now .info .s.err{color:#f0a08e;}
  .now .info .s.live{color:#9fd49a;}
  .controls{display:flex; align-items:center; gap:14px;}
  .play{
    width:58px; height:58px; border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, var(--brass2), var(--brass) 55%, #8a6a2a 100%);
    border:3px solid #6d5120; color:var(--ink); font-size:22px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 3px 6px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.45);
  }
  .play:active{transform:translateY(1px);}
  .play:disabled{opacity:.5;}
  .vol-wrap{flex:1; display:flex; align-items:center; gap:10px;}
  .vol-ico{font-size:17px; filter:sepia(.8);}
  input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:8px; border-radius:4px;
    background:linear-gradient(180deg,#3a2a16,#57402a); outline:none;
    border:1px solid var(--brass); box-shadow:inset 0 1px 3px rgba(0,0,0,.5);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--brass2), var(--brass) 60%, #8a6a2a);
    border:2px solid #6d5120; box-shadow:0 2px 3px rgba(0,0,0,.4);
  }
  .boost{
    width:46px; height:38px; border-radius:8px;
    background:linear-gradient(180deg,#8a5c33,#6b4423); border:2px solid var(--brass);
    color:var(--cream3); font-size:13px; font-weight:700; flex-shrink:0; font-family:inherit;
  }
  .boost.on{background:linear-gradient(180deg,var(--brass2),var(--brass)); color:var(--ink);}
  .eq{display:flex; align-items:flex-end; gap:3px; height:26px; flex-shrink:0;}
  .eq i{width:4px; background:var(--brass2); border-radius:2px; animation:eqb 1s ease-in-out infinite;}
  .eq i:nth-child(1){height:40%; animation-delay:0s}
  .eq i:nth-child(2){height:90%; animation-delay:.2s}
  .eq i:nth-child(3){height:60%; animation-delay:.4s}
  .eq i:nth-child(4){height:80%; animation-delay:.1s}
  @keyframes eqb{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

  .modal-bg{position:fixed; inset:0; background:rgba(30,18,6,.75); display:none; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{
    background:linear-gradient(180deg, var(--cream), var(--cream2));
    border:3px solid var(--brass); border-radius:10px; padding:20px; width:100%; max-width:380px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .modal h3{font-size:17px; margin-bottom:4px; color:var(--ink);}
  .modal p{font-size:12px; color:var(--ink2); margin-bottom:8px; font-style:italic;}
  .modal label{font-size:12px; color:var(--ink2); display:block; margin:12px 0 5px; font-weight:700;}
  .modal input[type=text]{
    width:100%; background:#fff9ea; border:2px solid var(--brass); border-radius:6px;
    padding:12px; color:var(--ink); font-size:14px; font-family:inherit;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.12);
  }
  .modal .row{display:flex; gap:10px; margin-top:20px;}
  .modal button{flex:1; padding:13px; border-radius:8px; border:1px solid #8a6a2a; font-size:14px; font-weight:700; font-family:inherit;}
  .modal .cancel{background:var(--cream2); color:var(--ink);}
  .modal .save{background:linear-gradient(180deg,var(--brass2),var(--brass)); color:var(--ink);}
</style>
</head>
<body>
<header>
  <span class="logo">📻</span>
  <div><h1>Oola Radio</h1><div class="sub">Uganda & worldwide</div></div>
  <div style="flex:1"></div>
  <button class="scan" id="installBtn" style="display:none">⬇️ Install</button>
  <button class="scan" id="scanBtn">🔄 Scan</button>
</header>

<div class="tabs">
  <button class="on" data-tab="stations">Stations</button>
  <button data-tab="favorites">Favorites</button>
  <button data-tab="mine">My URLs</button>
</div>

<div class="searchbar show" id="searchbar">
  <input type="text" id="searchIn" placeholder="Search any station — Mega, BBC, Jazz, Nigeria…">
  <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
    <button class="add-inline chip" data-q="Gulu">Gulu</button>
    <button class="add-inline chip" data-q="Lira">Lira</button>
    <button class="add-inline chip" data-q="Arua">Arua</button>
    <button class="add-inline chip" data-q="Kitgum">Kitgum</button>
    <button class="add-inline chip" data-q="Acholi">Acholi</button>
  </div>
</div>

<div class="list" id="list"></div>

<div class="player">
  <div class="dial">
    <div class="band">FM · MHz</div>
    <div class="ticks"></div>
    <div class="nums"><span>88</span><span>92</span><span>96</span><span>100</span><span>104</span><span>108</span></div>
    <div class="needle" id="needle"></div>
  </div>
  <div class="now">
    <div class="art" id="art">📻</div>
    <div class="info"><div class="t" id="nowName">Nothing playing</div><div class="s" id="nowStatus">Tap a station to start</div></div>
    <div class="eq" id="eq" style="display:none"><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="controls">
    <button class="play" id="playBtn" disabled>▶</button>
    <div class="vol-wrap"><span class="vol-ico">🔊</span><input type="range" id="vol" min="0" max="100" value="80"></div>
    <button class="boost" id="boostBtn" title="Volume boost">1x</button>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Add Station</h3>
    <p>Enter a name and stream URL (ends in .mp3, .aac, or a stream path).</p>
    <label>Station name</label>
    <input type="text" id="inName" placeholder="e.g. My Local FM">
    <label>Stream URL</label>
    <input type="text" id="inUrl" placeholder="https://…stream">
    <div class="row"><button class="cancel" id="cancelBtn">Cancel</button><button class="save" id="saveBtn">Save</button></div>
  </div>
</div>

<audio id="audio"></audio>

<script>
// ===== Radio Browser API (community DB of real internet-radio streams) =====
const API_HOSTS = [
  'https://de1.api.radio-browser.info',
  'https://at1.api.radio-browser.info',
  'https://nl1.api.radio-browser.info',
  'https://fi1.api.radio-browser.info'
];
async function apiFetch(path){
  let lastErr;
  for(const host of API_HOSTS){
    try{
      const r = await fetch(host + path, { headers:{'User-Agent':'OolaRadio/1.0'} });
      if(r.ok) return await r.json();
      lastErr = new Error('HTTP '+r.status);
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All API hosts failed');
}

// ===== Radio Garden (second source: HTTPS relay, has many regional stations) =====
const RG = 'https://radio.garden';
// Radio Garden's API blocks browser fetches (no CORS headers), so search goes
// through a small Google Apps Script proxy. Deploy radio-proxy.gs (in this
// folder) as a Web App (Execute as: Me, Access: Anyone) and paste the /exec
// URL here:
const RG_PROXY = 'https://script.google.com/macros/s/AKfycbzKNi1GZUNpaqbtnC8QfkEvFex8wdU7PY596QvBkOel766yLoDvpoRVSSukVr1U6jLlsQ/exec';
function rgStreamUrl(id){ return RG + '/api/ara/content/listen/' + id + '/channel.mp3'; }
async function rgSearch(term){
  let j = null;
  // Radio Garden blocks direct browser calls (CORS), so use the proxy when set
  if(RG_PROXY){
    try{
      const r = await fetch(RG_PROXY + '?q=' + encodeURIComponent(term));
      if(r.ok) j = await r.json();
    }catch(e){}
  } else {
    try{
      const r = await fetch(RG + '/api/search?q=' + encodeURIComponent(term));
      if(r.ok) j = await r.json();
    }catch(e){}
  }
  if(!j || j.error) return [];
  try{
    const hits = (j.hits && j.hits.hits) ? j.hits.hits : [];
    const out = [];
    for(const h of hits){
      const src = h._source || h.source || {};
      if((src.type||'').toLowerCase()!=='channel') continue;
      const url = src.url || '';
      const id = url.split('/').pop();
      if(!id) continue;
      out.push({ id:'rg_'+id, name:(src.title||'Unknown').trim(),
        desc:(src.subtitle||'Radio Garden')+' · relay', url:rgStreamUrl(id), fav:'', icon:'📻', votes:0,
        world: !/uganda/i.test(src.subtitle||'') });
    }
    return out;
  }catch(e){ return []; }
}

// Seeded northern Uganda stations via Radio Garden HTTPS relay (verified IDs)
const NORTH_SEEDS = [
  { id:'rg_DCiSSzLz', name:'102 Mega FM',              desc:'Gulu · relay',    url:rgStreamUrl('DCiSSzLz'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_1jR0KlL2', name:'Radio Rupiny 95.7 FM',     desc:'Gulu · relay',    url:rgStreamUrl('1jR0KlL2'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_VVPJwFJp', name:'Radio Pacis Gulu 101.4 FM',desc:'Gulu · relay',    url:rgStreamUrl('VVPJwFJp'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_9FGZeJKn', name:'Radio Wa FM 89.8',         desc:'Lira · relay',    url:rgStreamUrl('9FGZeJKn'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_RWW0UXvX', name:'Voice of Lango 88.0 FM',   desc:'Lira · relay',    url:rgStreamUrl('RWW0UXvX'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_LHckS4Xk', name:'Radio Unity FM 97.7',      desc:'Lira · relay',    url:rgStreamUrl('LHckS4Xk'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_VC9m2aY2', name:'Radio Pacis FM 90.9',      desc:'Arua · relay',    url:rgStreamUrl('VC9m2aY2'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_E1SQZTJa', name:'Radio Pacis FM 94.5',      desc:'Arua · relay',    url:rgStreamUrl('E1SQZTJa'), fav:'', icon:'📻', votes:5000 },
  { id:'rg_bFavoBLf', name:'Radio Paidha FM 87.8',     desc:'Paidha (West Nile) · relay', url:rgStreamUrl('bFavoBLf'), fav:'', icon:'📻', votes:5000 },
];

// ===== IndexedDB =====
const DB_NAME='oola-radio', DB_VER=2; let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('cache'))d.createObjectStore('cache',{keyPath:'id'});
    if(!d.objectStoreNames.contains('favorites'))d.createObjectStore('favorites',{keyPath:'id'});
    if(!d.objectStoreNames.contains('custom'))d.createObjectStore('custom',{keyPath:'id'});
    if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv',{keyPath:'k'});};
  r.onsuccess=e=>{db=e.target.result;res();}; r.onerror=e=>rej(e);});}
function st(s,m='readonly'){return db.transaction(s,m).objectStore(s);}
function getAll(s){return new Promise(r=>{const q=st(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>r([]);});}
function put(s,o){return new Promise(r=>{const q=st(s,'readwrite').put(o);q.onsuccess=r;q.onerror=r;});}
function del(s,id){return new Promise(r=>{const q=st(s,'readwrite').delete(id);q.onsuccess=r;q.onerror=r;});}
function clearStore(s){return new Promise(r=>{const q=st(s,'readwrite').clear();q.onsuccess=r;q.onerror=r;});}
function setKV(k,v){return new Promise(r=>{const q=st('kv','readwrite').put({k,v});q.onsuccess=r;q.onerror=r;});}
function getKV(k){return new Promise(r=>{const q=st('kv').get(k);q.onsuccess=()=>r(q.result?q.result.v:null);q.onerror=()=>r(null);});}

// ===== State =====
let stations=[], favorites=[], customs=[], current=null, tab='stations', filter='';
let searchResults=[], searching=false, searchTimer=null;
let audio=document.getElementById('audio');
const listEl=document.getElementById('list');
const playBtn=document.getElementById('playBtn');
const volEl=document.getElementById('vol');
const nowName=document.getElementById('nowName');
const nowStatus=document.getElementById('nowStatus');
const artEl=document.getElementById('art');
const scanBtn=document.getElementById('scanBtn');
const searchbar=document.getElementById('searchbar');

function normalize(s, world){
  return { id:'rb_'+s.stationuuid, name:(s.name||'Unknown').trim(),
    desc:[world?(s.country||''):'',s.codec,s.bitrate?s.bitrate+'kbps':'',s.tags?s.tags.split(',')[0]:''].filter(Boolean).join(' · ')||(world?(s.country||'World'):'Uganda'),
    url:s.url_resolved||s.url, fav:s.favicon||'', icon: world?'🌍':'📻', votes:s.votes||0, world:!!world, bitrate:s.bitrate||0 };
}

// ===== Scan =====
async function scan(){
  scanBtn.disabled=true; scanBtn.textContent='⏳ Scanning…';
  tab='stations'; syncTabs();
  renderStatus('<div class="spin"></div><div>Scanning for available Uganda stations…</div>');
  try{
    // Pull the full Uganda list (up to 500) ordered by name so regional/northern
    // stations aren't crowded out by high-vote Kampala ones.
    const raw = await apiFetch('/json/stations/bycountrycodeexact/UG?hidebroken=true&order=name&limit=500');
    // dedupe by name, preferring the LOWEST-bitrate variant (least data usage)
    const byName=new Map();
    for(const s of raw){
      const n=(s.name||'').trim().toLowerCase().replace(/\s*\(mp3\)|\s*\(aac\)/g,'');
      if(!n) continue; if(!(s.url_resolved||s.url)) continue;
      const prev=byName.get(n);
      const br=s.bitrate||0, pbr=prev?(prev.bitrate||0):Infinity;
      if(!prev || (br>0 && (pbr===0 || br<pbr))) byName.set(n,s);
    }
    const seen=new Set(); stations=[];
    for(const [n,s] of byName){ seen.add(n); stations.push(normalize(s)); }
    // Sweep Radio Garden for northern Uganda towns (HTTPS relay streams)
    renderStatus('<div class="spin"></div><div>Scanning northern Uganda stations…</div>');
    const towns=['Gulu','Lira','Arua','Kitgum','Moyo','Soroti','Uganda'];
    for(const t of towns){
      const rs = await rgSearch(t);
      for(const s of rs){
        const n=s.name.toLowerCase();
        if(seen.has(n)) continue;
        // only keep results whose subtitle mentions Uganda (rg search is global)
        if(!/uganda/i.test(s.desc)) continue;
        seen.add(n); stations.push(s);
      }
    }
    for(const s of NORTH_SEEDS){ if(!seen.has(s.name.toLowerCase())){ seen.add(s.name.toLowerCase()); stations.push(s);} }
    // Popular worldwide stations (BBC, international music, African stations, etc.)
    renderStatus('<div class="spin"></div><div>Adding popular worldwide stations…</div>');
    try{
      const world = await apiFetch('/json/stations/topvote/80?hidebroken=true');
      for(const s of world){
        const n=(s.name||'').trim().toLowerCase();
        if(!n||seen.has(n)) continue; if(!(s.url_resolved||s.url)) continue;
        seen.add(n); stations.push(normalize(s,true));
      }
    }catch(e){}
    // Sort: most-voted first, but everything is present
    stations.sort((a,b)=>b.votes-a.votes);
    await clearStore('cache');
    for(const s of stations) await put('cache',s);
    await setKV('lastScan', Date.now());
    render();
  }catch(e){
    renderStatus('<div>Couldn’t reach the station directory.</div><div style="margin-top:6px">Check your internet and tap Scan again. Cached stations still work if you scanned before.</div>');
  }finally{
    scanBtn.disabled=false; scanBtn.textContent='🔄 Scan Uganda';
  }
}

// ===== Render =====
function syncTabs(){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  searchbar.classList.toggle('show', tab==='stations');
}
function renderStatus(html){ listEl.innerHTML='<div class="status-row">'+html+'</div>'; }
function render(){
  syncTabs();
  if(tab==='stations'){
    let items = stations;
    if(filter){ const f=filter.toLowerCase(); items=items.filter(s=>s.name.toLowerCase().includes(f)||s.desc.toLowerCase().includes(f)); }
    // merge any live online-search results (e.g. northern stations not in cache)
    if(filter && searchResults.length){
      const have=new Set(items.map(s=>s.id));
      items = items.concat(searchResults.filter(s=>!have.has(s.id)));
    }
    if(!stations.length && !searchResults.length){ renderStatus('<div>No stations loaded yet.</div><div style="margin-top:6px">Tap <b>🔄 Scan Uganda</b> to load the current list.</div>'); return; }
    let head='';
    if(filter && searchResults.length){ head='<div class="section-h">Found online</div>'; }
    if(!items.length){
      renderStatus('<div>No matches for “'+esc(filter)+'” yet.</div><div style="margin-top:6px">'+(searching?'Searching online…':'Try a shorter word, or add its URL in “My URLs”.')+'</div>'); return;
    }
    const ug=items.filter(s=>!s.world), wd=items.filter(s=>s.world);
    let body='';
    if(ug.length) body+='<div class="section-h">🇺🇬 Uganda ('+ug.length+')</div>'+ug.map(s=>card(s,{fav:true})).join('');
    if(wd.length) body+='<div class="section-h">🌍 Worldwide ('+wd.length+')</div>'+wd.map(s=>card(s,{fav:true})).join('');
    listEl.innerHTML = (searching?'<div class="status-row" style="padding:8px"><div class="spin" style="width:16px;height:16px;margin:0"></div> searching online…</div>':'') + head + body;
  } else if(tab==='favorites'){
    if(!favorites.length){ renderStatus('<div>No favorites yet.</div><div style="margin-top:6px">Tap the ☆ on any station to save it here.</div>'); return; }
    listEl.innerHTML = favorites.map(s=>card(s,{fav:true})).join('');
  } else {
    let html = '<div class="section-h">My Stream URLs <button class="add-inline" id="addInline">+ Add</button></div>';
    html += customs.length ? customs.map(s=>card(s,{del:true})).join('') : '<div class="status-row">No custom stations. Tap <b>+ Add</b> to enter a stream URL manually.</div>';
    listEl.innerHTML = html;
    const ai=document.getElementById('addInline'); if(ai) ai.onclick=openModal;
  }
  bindCards();
}
function card(s,opt){
  const active = current&&current.id===s.id;
  const isFav = favorites.some(f=>f.id===s.id);
  const iconHtml = s.fav ? `<img src="${esc(s.fav)}" onerror="this.style.display='none';this.parentNode.textContent='📻'">` : (s.icon||'📻');
  return `<div class="station ${active?'active':''}" data-id="${s.id}">
    <div class="tap"><div class="ico">${iconHtml}</div>
      <div class="meta"><div class="name">${esc(s.name)}</div><div class="desc">${esc(s.desc||s.url)}</div></div>
      ${active&&!audio.paused?'<div class="live-dot"></div>':''}</div>
    ${opt.fav?`<button class="fav ${isFav?'on':''}">${isFav?'★':'☆'}</button>`:''}
    ${opt.del?'<button class="del">✕</button>':''}
  </div>`;
}
function bindCards(){
  listEl.querySelectorAll('.station').forEach(el=>{
    const id=el.dataset.id;
    el.querySelector('.tap').onclick=()=>select(id);
    const fav=el.querySelector('.fav'); if(fav) fav.onclick=e=>{e.stopPropagation();toggleFav(id);};
    const del=el.querySelector('.del'); if(del) del.onclick=e=>{e.stopPropagation();removeCustom(id);};
  });
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function allStations(){return [...stations,...searchResults,...favorites,...customs];}

// ===== Playback =====
let retryCount=0, retryTimer=null, stallTimer=null, wasHttp=false;
// --- volume boost via Web Audio gain ---
const BOOST_STEPS=[1,1.5,2,3];
let boost=1, actx=null, srcNode=null, gainNode=null;
const boostBtn=document.getElementById('boostBtn');
function buildChain(){
  if(actx) return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    srcNode=actx.createMediaElementSource(audio);
    gainNode=actx.createGain();
    srcNode.connect(gainNode); gainNode.connect(actx.destination);
  }catch(e){ actx=null; }
}
function applyBoost(){
  boostBtn.textContent=(boost%1?boost.toFixed(1):boost)+'x';
  boostBtn.classList.toggle('on',boost>1);
  if(gainNode) gainNode.gain.value=boost;
}
function rebuildAudioElement(){
  // drop the Web Audio chain entirely (some streams go silent inside it)
  try{ if(actx) actx.close(); }catch(e){}
  actx=null; srcNode=null; gainNode=null;
  const old=audio; const wasPlaying=current&&!old.paused;
  old.pause(); old.removeAttribute('src'); old.load();
  const el=document.createElement('audio');
  old.replaceWith(el);
  audio=el; attachAudioEvents();
  audio.volume=volEl.value/100;
  if(current){ audio.src=playableUrl(current.url); if(wasPlaying) audio.play().catch(()=>{}); }
}
boostBtn.onclick=()=>{
  const i=BOOST_STEPS.indexOf(boost);
  boost=BOOST_STEPS[(i+1)%BOOST_STEPS.length];
  if(boost>1){
    buildChain();
    if(actx&&actx.state==='suspended') actx.resume();
    if(!actx){ boost=1; alert('Volume boost not supported on this browser.'); }
  } else if(actx){
    rebuildAudioElement();
  }
  applyBoost();
  setKV('boost',boost);
};
function playableUrl(u){
  wasHttp = /^http:\/\//i.test(u);
  // HTTPS pages can't play http:// audio (browser blocks it) — try the https variant
  if(location.protocol==='https:' && wasHttp) return u.replace(/^http:/i,'https:');
  return u;
}
function bust(u){ return u + (u.includes('?')?'&':'?') + '_t=' + Date.now(); }
function moveNeedle(name){
  // parse FM frequency from station name (e.g. "102 Mega FM", "Radio Wa FM 89.8")
  const el=document.getElementById('needle');
  const m=(name||'').match(/\b(8[7-9]|9\d|10[0-8])(?:\.(\d))?\b/);
  let f;
  if(m){ f=parseFloat(m[1]+(m[2]?'.'+m[2]:'')); }
  else{ // stable pseudo-position from name hash for stations without a frequency
    let hsh=0; for(const c of name) hsh=(hsh*31+c.charCodeAt(0))>>>0;
    f=88+(hsh%200)/10;
  }
  const pct=Math.min(97,Math.max(3,((f-87)/(108.5-87))*100));
  el.style.left=pct+'%';
}
let userPaused=false;
function dataRate(){
  // ~MB per hour from bitrate: kbps × 3600s ÷ 8 ÷ 1024
  const kb = current && current.bitrate ? current.bitrate : 0;
  return kb ? ' · ~'+Math.round(kb*0.44)+' MB/hr' : '';
}
function select(id){
  const s=allStations().find(x=>x.id===id); if(!s)return;
  current=s; retryCount=0; userPaused=false; clearTimeout(retryTimer);
  audio.src = playableUrl(s.url);
  nowName.textContent=s.name;
  artEl.innerHTML = s.fav?`<img src="${esc(s.fav)}" onerror="this.parentNode.textContent='📻'">`:'📻';
  moveNeedle(s.name);
  setStatus('Tuning…','buffering'); playBtn.disabled=false;
  audio.play().catch(()=>setStatus('Tap ▶ to start',''));
  setKV('last',id); render(); mediaSession();
}
function reconnect(){
  if(!current) return;
  if(retryCount>=3){
    if(wasHttp && location.protocol==='https:')
      setStatus('Station uses an insecure (http) stream — blocked by the browser','err');
    else
      setStatus('Stream unavailable — try another','err');
    playBtn.textContent='▶'; render(); return;
  }
  retryCount++;
  setStatus('Reconnecting… ('+retryCount+'/3)','buffering');
  clearTimeout(retryTimer);
  retryTimer=setTimeout(()=>{
    audio.src = bust(playableUrl(current.url));
    audio.play().catch(()=>{});
  }, 1200*retryCount);
}
function armStallWatchdog(){
  clearTimeout(stallTimer);
  stallTimer=setTimeout(()=>{ if(current && !audio.paused && audio.readyState<3) reconnect(); }, 15000);
}
function setStatus(t,c){nowStatus.textContent=t;nowStatus.className='s'+(c?' '+c:'');}
playBtn.onclick=()=>{
  if(!current)return;
  if(audio.paused || !audio.src){
    userPaused=false;
    if(!audio.src) audio.src=playableUrl(current.url); // re-tune after data-saver stop
    audio.play().catch(()=>setStatus('Could not play stream','err'));
    setStatus('Tuning…','buffering');
  } else {
    // data saver: stop the download completely, not just pause playback
    userPaused=true;
    audio.pause(); audio.removeAttribute('src'); audio.load();
    setStatus('Paused — data stopped','');
    playBtn.textContent='▶'; document.getElementById('eq').style.display='none'; render();
  }
};
function attachAudioEvents(){
  audio.addEventListener('playing',()=>{retryCount=0;clearTimeout(stallTimer);setStatus('● Live'+dataRate(),'live');playBtn.textContent='❚❚';document.getElementById('eq').style.display='flex';render();mediaSession();});
  audio.addEventListener('pause',()=>{if(current&&!userPaused)setStatus('Paused','');playBtn.textContent='▶';document.getElementById('eq').style.display='none';render();});
  audio.addEventListener('waiting',()=>{if(!userPaused){setStatus('Buffering…','buffering');armStallWatchdog();}});
  audio.addEventListener('stalled',()=>{if(!userPaused){setStatus('Buffering…','buffering');armStallWatchdog();}});
  audio.addEventListener('error',()=>{ if(current && !userPaused){document.getElementById('eq').style.display='none'; reconnect();} });
}
attachAudioEvents();
volEl.addEventListener('input',()=>{audio.volume=volEl.value/100;setKV('vol',volEl.value);});

// ===== Favorites =====
async function toggleFav(id){
  const s=allStations().find(x=>x.id===id); if(!s)return;
  const i=favorites.findIndex(f=>f.id===id);
  if(i>=0){favorites.splice(i,1);await del('favorites',id);}
  else{favorites.push(s);await put('favorites',s);}
  render();
}

// ===== Custom URLs =====
const modalBg=document.getElementById('modalBg');
function openModal(){document.getElementById('inName').value='';document.getElementById('inUrl').value='';modalBg.classList.add('show');}
document.getElementById('cancelBtn').onclick=()=>modalBg.classList.remove('show');
modalBg.onclick=e=>{if(e.target===modalBg)modalBg.classList.remove('show');};
document.getElementById('saveBtn').onclick=async()=>{
  const name=document.getElementById('inName').value.trim();
  let url=document.getElementById('inUrl').value.trim();
  if(!name||!url){alert('Enter both a name and a stream URL.');return;}
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  const s={id:'c'+Date.now(),name,desc:'Custom stream',url,fav:'',icon:'📶'};
  customs.push(s); await put('custom',s); modalBg.classList.remove('show'); render();
};
async function removeCustom(id){
  if(!confirm('Remove this station?'))return;
  customs=customs.filter(s=>s.id!==id); await del('custom',id);
  if(current&&current.id===id){audio.pause();audio.src='';current=null;nowName.textContent='Nothing playing';setStatus('Tap a station to start','');playBtn.disabled=true;}
  render();
}

// ===== Media session =====
function mediaSession(){
  if(!('mediaSession'in navigator)||!current)return;
  navigator.mediaSession.metadata=new MediaMetadata({title:current.name,artist:'Oola Radio',album:current.desc||''});
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
}

// ===== Tabs & search =====
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;filter='';searchResults=[];document.getElementById('searchIn').value='';render();});
document.getElementById('searchIn').addEventListener('input',e=>{
  filter=e.target.value;
  render();
  // debounced live online search across the whole Radio Browser DB (Uganda)
  clearTimeout(searchTimer);
  searchResults=[];
  const term=filter.trim();
  if(term.length<2 || !navigator.onLine){ searching=false; return; }
  searchTimer=setTimeout(()=>onlineSearch(term), 450);
});
async function onlineSearch(term){
  searching=true; render();
  try{
    const [rbRaw, rgRes] = await Promise.all([
      apiFetch('/json/stations/search?hidebroken=true&order=votes&reverse=true&limit=30&name='+encodeURIComponent(term)).catch(()=>[]),
      rgSearch(term)
    ]);
    if(filter.trim()!==term){ searching=false; return; }
    const seen=new Set(stations.map(s=>s.name.toLowerCase()));
    searchResults=[];
    for(const s of rbRaw){
      const n=(s.name||'').trim().toLowerCase();
      if(!n||seen.has(n)) continue; if(!(s.url_resolved||s.url)) continue;
      seen.add(n); searchResults.push(normalize(s, (s.countrycode||'')!=='UG'));
    }
    for(const s of rgRes){
      const n=s.name.toLowerCase();
      if(seen.has(n)) continue;
      seen.add(n); searchResults.push(s);
    }
  }catch(e){ searchResults=[]; }
  finally{ searching=false; render(); }
}
scanBtn.onclick=scan;
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  const q=c.dataset.q;
  document.getElementById('searchIn').value=q; filter=q;
  render(); clearTimeout(searchTimer); onlineSearch(q);
});

// ===== Init =====
(async()=>{
  try{await openDB();}catch(e){}
  try{ stations=await getAll('cache'); favorites=await getAll('favorites'); customs=await getAll('custom'); }catch(e){}
  // ensure seeded northern stations are always present
  {
    const seen=new Set(stations.map(s=>s.name.toLowerCase()));
    for(const s of NORTH_SEEDS){ if(!seen.has(s.name.toLowerCase())) stations.push(s); }
  }
  const v=await getKV('vol'); if(v!=null)volEl.value=v; audio.volume=volEl.value/100;
  render();
  const last=await getKV('last');
  if(last){const s=allStations().find(x=>x.id===last); if(s){current=s;nowName.textContent=s.name;artEl.innerHTML=s.fav?`<img src="${esc(s.fav)}">`:'📻';setStatus('Tap ▶ to resume','');audio.src=s.url;playBtn.disabled=false;render();}}
  if(!stations.length && navigator.onLine){ scan(); }
})();

// ===== Service worker (real file — required for install) + install prompt =====
if('serviceWorker'in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt=e;
  const b=document.getElementById('installBtn'); if(b) b.style.display='inline-flex';
});
window.addEventListener('appinstalled', ()=>{ const b=document.getElementById('installBtn'); if(b) b.style.display='none'; });
document.getElementById('installBtn').onclick=async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null;
  document.getElementById('installBtn').style.display='none';
};
</script>
